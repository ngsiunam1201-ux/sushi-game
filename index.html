<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇軾知識密室 —— 尋找東坡肉的隱世秘方</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #dfd8c8;
            color: #2c1a0c;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
        }

        .container {
            background-color: #faf6eb;
            border: 6px solid #5d4037;
            border-radius: 4px;
            padding: 30px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(44, 26, 12, 0.3);
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
        }

        h1 {
            color: #8c1c1c;
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 28px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #795548;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .progress-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            background-color: #d7ccc8;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #a1887f;
        }

        .progress-item {
            font-size: 13px;
            text-align: center;
            color: #795548;
            font-weight: bold;
            opacity: 0.5;
        }

        .progress-item.active {
            color: #8c1c1c;
            opacity: 1;
            text-decoration: underline;
        }

        .progress-item.completed {
            color: #1b5e20;
            opacity: 1;
        }

        .stage {
            display: none;
        }

        .stage.active {
            display: block;
        }

        /* 替換原本圖片區塊的 Emoji 樣式 */
        .stage-emoji {
            text-align: center;
            font-size: 65px;
            margin-bottom: 25px;
            line-height: 1;
            padding: 15px;
            background-color: #fdfbf7;
            border: 1px dashed #d7ccc8;
            border-radius: 4px;
        }

        .story-box {
            background-color: #fdfaf1;
            border-left: 5px solid #8c1c1c;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
            border-radius: 0 4px 4px 0;
            border-top: 1px solid #efeae0;
            border-bottom: 1px solid #efeae0;
        }

        .question-box {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1b5e20;
            border-bottom: 1px dashed #d7ccc8;
            padding-bottom: 8px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #fdfbf7;
            border: 1px solid #d7ccc8;
            border-radius: 4px;
            padding: 12px 15px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            color: #2c1a0c;
            font-family: 'Noto Serif TC', serif;
            outline: none;
        }

        .option-btn:hover {
            background-color: #efebe9;
        }

        .option-btn.selected {
            background-color: #ffebeb !important;
            border: 2px solid #8c1c1c !important;
            color: #8c1c1c !important;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #d7ccc8;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            background-color: #fdfbf7;
            font-family: 'Noto Serif TC', serif;
        }

        .action-btn {
            background-color: #8c1c1c;
            color: #faf6eb;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background-color: #5d0e0e;
        }

        .message-box {
            margin-top: 15px;
            min-height: 24px;
            text-align: center;
            font-weight: bold;
        }

        .success-msg { color: #1b5e20; }
        .error-msg { color: #b71c1c; }

        .fragment-highlight {
            color: #b71c1c;
            font-size: 18px;
            background: #fff8e1;
            padding: 2px 8px;
            border: 1px solid #ffe082;
        }

        .victory { text-align: center; }
        .victory h2 { color: #1b5e20; font-size: 28px; }
        .secret-scroll {
            background-color: #fffee0;
            border: 2px dashed #fbc02d;
            padding: 20px;
            margin: 20px 0;
            font-size: 16px;
            line-height: 1.8;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📜 蘇軾知識密室</h1>
    <div class="subtitle">—— 尋找東坡肉的隱世秘方 ——</div>

    <div class="progress-container">
        <span id="p1" class="progress-item active">第一關：饕客</span>
        <span id="p2" class="progress-item">第二關：赤壁</span>
        <span id="p3" class="progress-item">第三關：解密
