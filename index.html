<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇軾知識密室｜尋找東坡肉秘方</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            /* Aged rice paper / silk background color */
            font-family: 'Noto Serif TC', serif;
            background-color: #dfd8c8;
            color: #2c1a0c;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
        }
        .container {
            /* Worn silk scroll frame */
            background-color: #faf6eb;
            border: 8px solid #5d4037;
            border-image: url('https://i.imgur.com/8Qp2ZfH.png') 30 round;
            border-radius: 4px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(44, 26, 12, 0.3);
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
        }
        h1 {
            /* Calligraphic red seal style */
            color: #8c1c1c;
            text-align: center;
            margin-top: 0;
            font-size: 28px;
            letter-spacing: 3px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #3e2723;
            font-size: 16px;
            margin-top: -5px;
            margin-bottom: 25px;
            font-weight: 400;
        }
        
        /* Themed image styling inside stages */
        .stage-theme-img {
            display: block;
            margin: 0 auto 20px auto;
            max-width: 100%;
            height: auto;
            border: 1px solid #a1887f;
            padding: 2px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background-color: #d7ccc8;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #a1887f;
        }
        .progress-item {
            color: #795548;
        }
        .progress-item.active {
            color: #8c1c1c;
        }
        .progress-item.completed {
            color: #1b5e20;
        }
        
        .stage {
            display: none;
        }
        .stage.active {
            display: block;
        }
        .story-box {
            /* Parchment texture */
            background-color: #fdfaf1;
            border-left: 5px solid #8c1c1c;
            padding: 18px;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.7;
            border-radius: 0 4px 4px 0;
            border-top: 1px solid #efeae0;
            border-bottom: 1px solid #efeae0;
        }
        .question-box {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 18px;
            color: #1b5e20; /* Bamboo green */
            border-bottom: 1px dashed #d7ccc8;
            padding-bottom: 10px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }
        .option-btn {
            background-color: #fdfbf7;
            border: 1px solid #d7ccc8;
            border-radius: 4px;
            padding: 14px 18px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: #2c1a0c;
            font-family: 'Noto Serif TC', serif;
        }
        .option-btn:hover {
            background-color: #efebe9;
            border-color: #a1887f;
        }
        .option-btn.selected {
            background-color: #ffebeb;
            border-color: #8c1c1c;
            color: #8c1c1c;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            border: 2px solid #d7ccc8;
            border-radius: 4px;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
            background-color: #fdfbf7;
            color: #2c1a0c;
            font-family: 'Noto Serif TC', serif;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #8c1c1c;
            box-shadow: 0 0 8px rgba(140, 28, 28, 0.3);
        }

            text-align: center;
        }
